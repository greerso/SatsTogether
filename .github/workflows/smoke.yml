name: Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Smoke (Rust + Node tests)
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          ./scripts/smoke-test.sh
